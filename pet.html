<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌面宠物</title>
  <style>
    :root {
      --pet-size: 220px;
      --accent: #ff9f43;
      --text: #43362c;
    }

    * { box-sizing: border-box; user-select: none; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    }
    body { display: grid; place-items: center; }

    .stage {
      position: relative;
      width: calc(var(--pet-size) + 120px);
      height: calc(var(--pet-size) + 260px);
      display: grid;
      place-items: end center;
      padding: 72px 40px 92px;
      cursor: grab;
    }
    .stage:active { cursor: grabbing; }

    .bubble {
      position: absolute;
      left: 50%;
      top: 4px;
      max-width: calc(var(--pet-size) + 34px);
      transform: translate(-50%, -8px) scale(.92);
      padding: 9px 13px;
      border-radius: 18px 18px 18px 6px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(255, 199, 122, .95);
      box-shadow: 0 8px 22px rgba(60, 40, 20, .16);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      text-align: center;
      z-index: 10;
    }
    .bubble.show { opacity: 1; transform: translate(-50%, 0) scale(1); }

    .actions {
      position: absolute;
      left: 50%;
      bottom: calc(var(--pet-size) + 110px);
      transform: translateX(-50%) translateY(10px);
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: calc(var(--pet-size) + 50px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 8;
    }
    .stage:hover .actions { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

    button {
      border: 0;
      border-radius: 999px;
      padding: 7px 11px;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      background: linear-gradient(135deg, #ffb347, #ff7f50);
      box-shadow: 0 7px 18px rgba(255, 127, 80, .27);
      cursor: pointer;
    }
    button.secondary { background: linear-gradient(135deg, #8ec5fc, #67a6ff); }
    button:hover { filter: brightness(1.05); transform: translateY(-1px); }

    .pet {
      position: relative;
      width: var(--pet-size);
      height: var(--pet-size);
      display: grid;
      place-items: center;
      filter: drop-shadow(0 12px 16px rgba(37, 24, 10, .2));
      animation: breathe 2.8s ease-in-out infinite;
    }
    .pet.motion-eat { animation: motion-eat 1.15s ease-in-out 1; }
    .pet.motion-sleep { animation: motion-sleep 1.8s ease-in-out 1; }
    .pet.motion-laugh { animation: motion-laugh .95s ease-in-out 1; }
    .pet.motion-naughty { animation: motion-naughty 1.05s ease-in-out 1; }
    .media {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .placeholder { position: relative; width: 82%; height: 82%; }
    .head {
      position: absolute;
      left: 15%;
      top: 17%;
      width: 70%;
      height: 66%;
      border-radius: 48% 48% 45% 45%;
      background: linear-gradient(145deg, #ffd08a, #f3a64d);
      box-shadow: inset -13px -13px 0 rgba(143, 87, 35, .08);
    }
    .ear {
      position: absolute;
      top: 11%;
      width: 27%;
      height: 45%;
      border-radius: 55% 55% 75% 75%;
      background: #a8673c;
      z-index: -1;
    }
    .ear.left { left: 6%; transform: rotate(-22deg); }
    .ear.right { right: 6%; transform: rotate(22deg); }
    .eye {
      position: absolute;
      top: 45%;
      width: 9%;
      height: 11%;
      border-radius: 50%;
      background: #3e2c22;
    }
    .eye.left { left: 36%; }
    .eye.right { right: 36%; }
    .snout {
      position: absolute;
      left: 34%;
      bottom: 20%;
      width: 32%;
      height: 25%;
      border-radius: 50% 50% 45% 45%;
      background: #fff2df;
    }
    .nose {
      position: absolute;
      left: 44%;
      bottom: 35%;
      width: 12%;
      height: 9%;
      border-radius: 50%;
      background: #2c211b;
    }
    .mouth {
      position: absolute;
      left: 47%;
      bottom: 28%;
      width: 6%;
      height: 10%;
      border-radius: 0 0 999px 999px;
      border-bottom: 3px solid #8b4b37;
    }
    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.018); }
    }
    @keyframes motion-eat {
      0%, 100% { transform: translateY(0) rotate(0) scale(1); }
      20% { transform: translateY(5px) rotate(-3deg) scale(1.02); }
      42% { transform: translateY(0) rotate(3deg) scale(1.04); }
      64% { transform: translateY(5px) rotate(-2deg) scale(1.02); }
      82% { transform: translateY(0) rotate(2deg) scale(1.03); }
    }
    @keyframes motion-sleep {
      0%, 100% { transform: translateY(0) rotate(0) scale(1); opacity: 1; }
      35%, 72% { transform: translateY(10px) rotate(-5deg) scale(.96); opacity: .9; }
    }
    @keyframes motion-laugh {
      0%, 100% { transform: translateY(0) scale(1); }
      18%, 54%, 86% { transform: translateY(-7px) scale(1.04); }
      36%, 70% { transform: translateY(2px) scale(.99); }
    }
    @keyframes motion-naughty {
      0%, 100% { transform: translateX(0) rotate(0); }
      16% { transform: translateX(-9px) rotate(-7deg); }
      32% { transform: translateX(9px) rotate(7deg); }
      48% { transform: translateX(-7px) rotate(-5deg); }
      64% { transform: translateX(7px) rotate(5deg); }
      80% { transform: translateX(0) rotate(-3deg); }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="bubble" id="bubble"></div>
    <div class="actions" id="actions"></div>
    <section class="pet" id="pet"></section>
  </main>

  <script>
    const { ipcRenderer } = require('electron');

    const stage = document.getElementById('stage');
    const pet = document.getElementById('pet');
    const bubble = document.getElementById('bubble');
    const actions = document.getElementById('actions');

    let state;
    let bubbleTimer;
    let idleTimer;
    let motionTimer;
    let temporaryAssetId = null;
    let dragState = null;


    function randomFrom(items, fallback) {
      if (!Array.isArray(items) || items.length === 0) return fallback;
      return items[Math.floor(Math.random() * items.length)] || fallback;
    }

    function say(text, duration = 2600) {
      clearTimeout(bubbleTimer);
      bubble.textContent = text;
      bubble.classList.add('show');
      bubbleTimer = setTimeout(() => bubble.classList.remove('show'), duration);
    }

    function selectedAsset() {
      if (!state) return null;
      const activeId = temporaryAssetId || state.selectedAssetId;
      return state.assets.find((asset) => asset.id === activeId) || null;
    }

    function playMotion(motion = 'none') {
      const motionClass = `motion-${motion}`;
      clearTimeout(motionTimer);
      pet.classList.remove('motion-eat', 'motion-sleep', 'motion-laugh', 'motion-naughty');
      if (!['motion-eat', 'motion-sleep', 'motion-laugh', 'motion-naughty'].includes(motionClass)) return;
      void pet.offsetWidth;
      pet.classList.add(motionClass);
      motionTimer = setTimeout(() => {
        pet.classList.remove(motionClass);
      }, motion === 'sleep' ? 1900 : 1250);
    }

    function switchToAsset(assetId) {
      if (!assetId || !state.assets.some((asset) => asset.id === assetId)) return;
      temporaryAssetId = assetId;
      render();
    }

    function render() {
      if (!state) return;
      const size = Number(state.settings.size) || 220;
      document.documentElement.style.setProperty('--pet-size', `${size}px`);

      const asset = selectedAsset();
      if (asset) {
        const tag = asset.type === 'video' ? 'video' : 'img';
        const autoplay = asset.type === 'video' ? 'autoplay muted loop playsinline' : '';
        pet.innerHTML = `<${tag} class="media" src="${asset.url}" ${autoplay}></${tag}>`;
      } else {
        pet.innerHTML = `
          <div class="placeholder" aria-label="默认宠物占位形象">
            <div class="ear left"></div><div class="ear right"></div>
            <div class="head"><div class="eye left"></div><div class="eye right"></div><div class="snout"></div><div class="nose"></div><div class="mouth"></div></div>
          </div>
        `;
      }

      actions.innerHTML = '';
      for (const item of state.settings.buttons || []) {
        const button = document.createElement('button');
        button.textContent = item.label || '互动';
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          switchToAsset(item.assetId);
          playMotion(item.motion);
          say(randomFrom(item.responses, `${item.label || '互动'}！`));
        });
        actions.appendChild(button);
      }

      const panelButton = document.createElement('button');
      panelButton.textContent = '面板';
      panelButton.className = 'secondary';
      panelButton.addEventListener('click', (event) => {
        event.stopPropagation();
        ipcRenderer.invoke('open-panel');
      });
      actions.appendChild(panelButton);

      resetIdleMessage();
    }

    function resetIdleMessage() {
      clearInterval(idleTimer);
      const interval = Math.max(5000, Number(state.settings.idleMessageInterval) || 18000);
      idleTimer = setInterval(() => {
        say(randomFrom(state.settings.idleMessages, '我一直在这里哦～'), 3200);
      }, interval);
    }

    stage.addEventListener('click', () => {
      if (dragState && dragState.moved) return;
      say(randomFrom(state.settings.clickResponses, '嗨！'));
    });

    stage.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      ipcRenderer.invoke('open-panel');
    });

    stage.addEventListener('mousedown', (event) => {
      if (event.button !== 0 || event.target.tagName === 'BUTTON') return;
      dragState = { x: event.screenX, y: event.screenY, moved: false };
    });

    window.addEventListener('mousemove', (event) => {
      if (!dragState) return;
      const dx = event.screenX - dragState.x;
      const dy = event.screenY - dragState.y;
      if (Math.abs(dx) + Math.abs(dy) < 2) return;
      dragState.moved = true;
      dragState.x = event.screenX;
      dragState.y = event.screenY;
      ipcRenderer.invoke('pet-drag', { dx, dy });
    });

    window.addEventListener('mouseup', () => {
      if (!dragState) return;
      if (dragState.moved) ipcRenderer.invoke('save-pet-position');
      setTimeout(() => { dragState = null; }, 0);
    });

    ipcRenderer.on('state-changed', (_event, nextState) => {
      state = nextState;
      if (temporaryAssetId && !state.assets.some((asset) => asset.id === temporaryAssetId)) {
        temporaryAssetId = null;
      }
      render();
    });

    ipcRenderer.invoke('get-state').then((nextState) => {
      state = nextState;
      render();
      if (!selectedAsset() && !state.settings.onboardingShown) {
        setTimeout(() => say('欢迎！打开控制面板上传你的宠物素材吧。', 4200), 500);
        ipcRenderer.invoke('mark-onboarding-shown');
      }
    });
  </script>
</body>
</html>
